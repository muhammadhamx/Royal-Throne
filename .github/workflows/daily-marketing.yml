name: Daily Social Media Marketing

on:
  schedule:
    # Runs daily at 14:00 UTC (7pm PKT, 10am EST - good engagement times)
    - cron: '0 14 * * *'
  workflow_dispatch: # Manual trigger for testing

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pick today's post
        id: pick
        run: |
          # Use day-of-year to cycle through posts deterministically
          DAY=$(date +%j)
          TOTAL=$(jq length marketing/posts.json)
          INDEX=$(( DAY % TOTAL ))

          # Extract post text and tags
          POST_TEXT=$(jq -r ".[$INDEX].text" marketing/posts.json)
          TAGS=$(jq -r ".[$INDEX].tags | map(\"#\" + .) | join(\" \")" marketing/posts.json)

          # Save to outputs (use delimiter for multiline)
          echo "index=$INDEX" >> $GITHUB_OUTPUT

          # Write post to file for other steps
          echo "$POST_TEXT" > /tmp/post_text.txt
          echo "$TAGS" > /tmp/post_tags.txt

          echo "Selected post index: $INDEX"
          echo "Tags: $TAGS"

      # ─── Twitter/X (DISABLED — requires $100/month paid API plan) ───
      # - name: Post to Twitter/X
      #   if: env.TWITTER_ENABLED == 'true'
      #   continue-on-error: true
      #   env:
      #     TWITTER_ENABLED: ${{ secrets.TWITTER_API_KEY != '' }}
      #     TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
      #     TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
      #     TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
      #     TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
      #   run: |
      #     pip install tweepy -q
      #     python3 << 'PYEOF'
      #     import tweepy, os
      #     client = tweepy.Client(
      #         consumer_key=os.environ['TWITTER_API_KEY'],
      #         consumer_secret=os.environ['TWITTER_API_SECRET'],
      #         access_token=os.environ['TWITTER_ACCESS_TOKEN'],
      #         access_token_secret=os.environ['TWITTER_ACCESS_SECRET']
      #     )
      #     with open('/tmp/post_text.txt') as f:
      #         text = f.read().strip()
      #     with open('/tmp/post_tags.txt') as f:
      #         tags = f.read().strip()
      #     tweet = text
      #     if len(tweet) + len(tags) + 2 <= 280:
      #         tweet = f"{text}\n\n{tags}"
      #     elif len(tweet) > 280:
      #         tweet = tweet[:277] + "..."
      #     response = client.create_tweet(text=tweet)
      #     print(f"Tweet posted: {response.data['id']}")
      #     PYEOF

      # ─── Bluesky ───
      - name: Post to Bluesky
        continue-on-error: true
        if: env.BLUESKY_ENABLED == 'true'
        env:
          BLUESKY_ENABLED: ${{ secrets.BLUESKY_HANDLE != '' }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
        run: |
          pip install atproto -q
          python3 << 'PYEOF'
          from atproto import Client
          import os

          client = Client()
          client.login(os.environ['BLUESKY_HANDLE'], os.environ['BLUESKY_PASSWORD'])

          with open('/tmp/post_text.txt') as f:
              text = f.read().strip()
          with open('/tmp/post_tags.txt') as f:
              tags = f.read().strip()

          post = f"{text}\n\n{tags}"
          # Bluesky limit is 300 chars for graphemes
          if len(post) > 300:
              post = text[:297] + "..."

          response = client.send_post(text=post)
          print(f"Bluesky post created: {response.uri}")
          PYEOF

      # ─── Mastodon ───
      - name: Post to Mastodon
        continue-on-error: true
        if: env.MASTODON_ENABLED == 'true'
        env:
          MASTODON_ENABLED: ${{ secrets.MASTODON_ACCESS_TOKEN != '' }}
          MASTODON_INSTANCE: ${{ secrets.MASTODON_INSTANCE }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
        run: |
          POST_TEXT=$(cat /tmp/post_text.txt)
          TAGS=$(cat /tmp/post_tags.txt)
          FULL_POST="$POST_TEXT

          $TAGS"
          INSTANCE="${MASTODON_INSTANCE:-https://mastodon.social}"

          curl -s -X POST "${INSTANCE}/api/v1/statuses" \
            -H "Authorization: Bearer $MASTODON_ACCESS_TOKEN" \
            -F "status=${FULL_POST}" \
            -F "visibility=public" | jq -r '.url // .error'

      # ─── Summary ───
      - name: Summary
        run: |
          INDEX=$(cat $GITHUB_OUTPUT 2>/dev/null | grep index | cut -d= -f2 || echo "?")
          echo "## Daily Marketing Post" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Post Index:** $INDEX" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/post_text.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** $(cat /tmp/post_tags.txt)" >> $GITHUB_STEP_SUMMARY
